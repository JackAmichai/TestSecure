<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת תרגול - אבטחת מערכות תוכנה</title>
    <style>
        :root {
            --primary-color: #1e88e5;
            --secondary-color: #607d8b;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #263238;
            --correct-color: #43a047;
            --incorrect-color: #e53935;
            --highlight-bg: #fff9c4;
            --highlight-border: #fbc02d;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1e88e5, #1565c0);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 24px; }
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .exam-selection {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        select {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 2px solid #cfd8dc;
            outline: none;
            cursor: pointer;
        }
        .question {
            margin-bottom: 40px;
            padding: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
            position: relative;
        }
        .topic-badge {
            background-color: var(--secondary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 12px;
            display: inline-block;
        }
        .question-text {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #37474f;
            white-space: pre-wrap;
        }
        .options {
            list-style-type: none;
            padding: 0;
        }
        .option {
            margin: 12px 0;
            padding: 16px;
            background: #fff;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .option:hover {
            border-color: var(--primary-color);
            background-color: #f1f8ff;
        }
        .option input {
            margin-left: 15px;
            transform: scale(1.3);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.99); }
        .btn:hover { background-color: #1565c0; }
        .explanation-box {
            margin-top: 20px;
            padding: 20px;
            background-color: var(--highlight-bg);
            border-right: 8px solid var(--highlight-border);
            border-radius: 6px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .explanation-title {
            font-weight: bold;
            color: #f57f17;
            margin-bottom: 8px;
            display: block;
            font-size: 16px;
        }
        .correct { border-color: var(--correct-color) !important; background-color: #e8f5e9 !important; color: #1b5e20; }
        .incorrect { border-color: var(--incorrect-color) !important; background-color: #ffebee !important; color: #b71c1c; }
        .reveal { display: block !important; }
        #restartBtn { background-color: #78909c; margin-top: 15px; display: none; }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .question-text { font-size: 17px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>תרגול מבחן: אבטחת מערכות תוכנה (20940)</h1>
    </header>
    
    <div class="container">
        <div class="exam-selection">
            <label for="examSelect"><strong>בחר מבחן:</strong></label>
            <select id="examSelect" onchange="loadExam()">
                <!-- Populated by JS -->
            </select>
        </div>

        <div id="quizContainer">
            <!-- Questions loaded here -->
        </div>

        <button id="doneBtn" class="btn" onclick="showResults()">סיום מבחן והצגת פתרונות</button>
        <button id="restartBtn" class="btn" onclick="loadExam()">התחל מבחן זה מחדש</button>
    </div>

    <script>
        let allQuestions = [];
        let currentExamQuestions = [];

        async function init() {
            try {
                const response = await fetch('questions.json');
                allQuestions = await response.json();
                populateExamSelect();
                loadExam();
            } catch (error) {
                console.error("שגיאה בטעינת השאלות:", error);
            }
        }

        function populateExamSelect() {
            const select = document.getElementById('examSelect');
            const totalExams = Math.ceil(allQuestions.length / 5);
            for (let i = 0; i < totalExams; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `מבחן ${i + 1}`;
                select.appendChild(option);
            }
        }

        function loadExam() {
            const examIndex = document.getElementById('examSelect').value;
            const start = examIndex * 5;
            currentExamQuestions = allQuestions.slice(start, start + 5);
            
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            
            currentExamQuestions.forEach((q, qIdx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                qDiv.innerHTML = `
                    <span class="topic-badge">${q.topic}</span>
                    <div class="question-text">${q.question}</div>
                    <ul class="options">
                        ${q.options.map((opt, optIdx) => `
                            <li class="option" onclick="selectOption(this)">
                                <input type="radio" name="q${qIdx}" value="${opt.replace(/"/g, '&quot;')}">
                                <span>${opt}</span>
                            </li>
                        `).join('')}
                    </ul>
                    <div id="exp${qIdx}" class="explanation-box">
                        <span class="explanation-title">💡 פתרון ונימוק טכני:</span>
                        <div class="explanation-content">${q.explanation}</div>
                    </div>
                `;
                container.appendChild(qDiv);
            });
            
            document.getElementById('doneBtn').style.display = 'block';
            document.getElementById('restartBtn').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectOption(el) {
            const radio = el.querySelector('input');
            if (!radio.disabled) {
                radio.checked = true;
            }
        }

        function showResults() {
            currentExamQuestions.forEach((q, qIdx) => {
                const selected = document.querySelector(`input[name="q${qIdx}"]:checked`);
                const expBox = document.getElementById(`exp${qIdx}`);
                const options = document.querySelectorAll(`input[name="q${qIdx}"]`);
                
                expBox.classList.add('reveal');
                
                options.forEach(optInput => {
                    const li = optInput.closest('li');
                    optInput.disabled = true;
                    if (optInput.value === q.answer) {
                        li.classList.add('correct');
                    } else if (selected && optInput.value === selected.value) {
                        li.classList.add('incorrect');
                    }
                });
            });
            document.getElementById('doneBtn').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'block';
        }

        init();
    </script>
</body>
</html>
